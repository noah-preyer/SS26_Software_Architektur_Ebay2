spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8083
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/users/**

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/products/**

server:
  port: 8080

jwt:
  secret: your-256-bit-secret-key-change-this-in-production-please
