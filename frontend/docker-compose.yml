services:
  test-backend:
    build: ./test-backend
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      DATA_FILE: /data/data.json # Persistenz auf dem Volume unten
    volumes:
      - test-backend-data:/data

  frontend:
    build: .
    ports:
      - "4321:4321"
    env_file: .env
    environment:
      BACKEND_TARGET: ${BACKEND_TARGET_OVERRIDE:-http://api-gateway:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ss26_software_architektur_ebay2_default

volumes:
  test-backend-data:

networks:
  ss26_software_architektur_ebay2_default:
    external: true
