spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/user/**
          filters:
           - StripPrefix=1

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/order/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/payment/**
          filters:
            - StripPrefix=1

        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

        - id: image-service
          uri: http://image-service:8080
          predicates:
            - Path=/image/**
          filters:
            - StripPrefix=1

server:
  port: 8080

jwt:
  secret: ss26-software-architecture-group-5
